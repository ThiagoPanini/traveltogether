name: deploy

# Portao 3 — deploy em producao no merge para main.
# Fluxo: build web+api -> push GHCR -> redeploy Coolify via webhook -> smoke test web.
# O job deploy e guardado por COOLIFY_TOKEN: enquanto o secret nao estiver
# configurado, build/push rodam e o deploy e pulado (nao falha).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-push:
    name: build-push (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web, api]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/thiagopanini/travelmanager-${{ matrix.app }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.app == 'web' && '.' || format('apps/{0}', matrix.app) }}
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy (coolify)
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - id: guard
        run: echo "enabled=${{ secrets.COOLIFY_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Trigger Coolify redeploy (api + web)
        if: steps.guard.outputs.enabled == 'true'
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          API_UUID: ${{ secrets.COOLIFY_API_UUID }}
          WEB_UUID: ${{ secrets.COOLIFY_WEB_UUID }}
        run: |
          set -euo pipefail
          missing=""
          [ -z "$COOLIFY_URL" ] && missing="$missing COOLIFY_URL"
          [ -z "$API_UUID" ] && missing="$missing COOLIFY_API_UUID"
          [ -z "$WEB_UUID" ] && missing="$missing COOLIFY_WEB_UUID"
          if [ -n "$missing" ]; then
            echo "::error::Deploy abortado - secret(s) ausente(s):${missing}."
            exit 1
          fi

          for uuid in "$API_UUID" "$WEB_UUID"; do
            echo "Disparando deploy do app $uuid..."
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              "${COOLIFY_URL}/api/v1/deploy?uuid=${uuid}&force=true"
          done

      - name: Smoke test (travelmanager.panlabs.tech)
        if: steps.guard.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          public_url="https://travelmanager.panlabs.tech"
          body="$(mktemp)"

          echo "Aguardando deploy estabilizar..."
          sleep 20
          for i in $(seq 1 15); do
            code="$(curl -fsS -o "$body" -w "%{http_code}" "${public_url}/" || true)"
            if [ "$code" = "200" ] && grep -qi "travel" "$body"; then
              echo "Smoke OK (tentativa $i)"; exit 0
            fi
            echo "tentativa $i: HTTP ${code} - aguardando..."
            sleep 10
          done
          echo "::error::Smoke test falhou - ${public_url} nao respondeu como esperado."; exit 1

      - name: Deploy pulado (sem secrets do Coolify)
        if: steps.guard.outputs.enabled != 'true'
        run: |
          echo "::notice::COOLIFY_TOKEN ausente — build/push para GHCR feito, deploy pulado."
          echo "::notice::Configure os secrets COOLIFY_TOKEN, COOLIFY_URL, COOLIFY_API_UUID, COOLIFY_WEB_UUID."
