name: pr-checks

# Portão 2 — gate real antes do merge na main.
# Dispara no push das branches de trabalho (incluindo worktree/** geradas
# pelo agente). open-pr abre PR para a main quando todos os checks ficam
# verdes; merge continua humano (ADR-0006 / ADR-0005).

on:
  push:
    branches:
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
      - "refactor/**"
      - "test/**"
      - "worktree/**"

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: lint (biome)
        run: pnpm exec biome check apps/web
      - name: typecheck (tsc)
        run: pnpm --filter @travelmanager/web typecheck
      - name: test (vitest)
        run: pnpm --filter @travelmanager/web test

  api:
    name: api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: format (ruff)
        run: uv run ruff format --check .
      - name: lint (ruff)
        run: uv run ruff check .
      - name: typecheck (pyright)
        run: uv run pyright
      - name: test (pytest)
        run: uv run pytest -m "not integration" -q

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  open-pr:
    name: open-pr
    needs: [web, api, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Abrir PR para a main se ainda nao existir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$(gh pr list --head "$BRANCH" --base main --state open --json number --jq 'length')" -ne 0 ]; then
            echo "::notice::Ja existe PR aberto de $BRANCH para a main."
            exit 0
          fi

          git fetch --quiet origin main
          if [ "$(git rev-list --count FETCH_HEAD..HEAD)" -eq 0 ]; then
            echo "::notice::$BRANCH nao tem commits novos sobre a main."
            exit 0
          fi

          title="$(git log "FETCH_HEAD..HEAD" --pretty=%s | head -n1 || true)"
          [ -z "$title" ] && title="$(git log -1 --pretty=%s)"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$title" \
            --body "PR aberto automaticamente apos checks verdes (pr-checks). Merge continua humano."

          echo "::notice::PR aberto: $BRANCH -> main"
