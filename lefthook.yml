# Hooks locais. CI continua sendo o gate real (pr-checks.yml).
pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: pnpm exec biome check --no-errors-on-unmatched {staged_files}

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
