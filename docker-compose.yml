# Compose mínimo para subir o esqueleto localmente (web + api).
# Postgres entra na fatia #173.
services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      TRAVELTOGETHER_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
