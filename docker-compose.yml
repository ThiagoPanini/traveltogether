services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      # API alcançável pela rede interna do compose
      TRAVELTOGETHER_API_URL: http://api:8000
      # AUTH_SECRET PRECISA ser idêntico ao da API (ADR-0003). Override via
      # shell/.env; o default só serve para dev local.
      AUTH_SECRET: ${AUTH_SECRET:-dev-local-shared-secret-change-me}
      NEXTAUTH_SECRET: ${AUTH_SECRET:-dev-local-shared-secret-change-me}
      # URL voltada ao browser (não usar o host interno aqui)
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      # E-mails liberados no beta fechado (CSV)
      AUTH_ALLOWLIST: ${AUTH_ALLOWLIST:-}
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://traveltogether:traveltogether@postgres:5432/traveltogether
      # Mesmo segredo do web — senão toda chamada autenticada falha com 401
      AUTH_SECRET: ${AUTH_SECRET:-dev-local-shared-secret-change-me}
      AUTH_ALLOWLIST: ${AUTH_ALLOWLIST:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: traveltogether
      POSTGRES_PASSWORD: traveltogether
      POSTGRES_DB: traveltogether
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traveltogether -d traveltogether"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
