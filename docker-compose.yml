services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      TRAVELTOGETHER_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://traveltogether:traveltogether@postgres:5432/traveltogether
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: traveltogether
      POSTGRES_PASSWORD: traveltogether
      POSTGRES_DB: traveltogether
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traveltogether -d traveltogether"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
